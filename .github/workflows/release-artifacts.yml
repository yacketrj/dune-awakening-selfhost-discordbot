name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  addon-package:
    name: addon-package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate release tag
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${VERSION}."
            exit 1
          fi
      - run: npm run check
      - name: Verify release checksums
        shell: bash
        run: |
          cd dist
          sha256sum -c "discord-readonly-bot-v${{ steps.release.outputs.version }}.tar.gz.sha256"
          sha256sum -c "dune-awakening-selfhost-discordbot.cdx.json.sha256"
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: discord-readonly-bot-addon
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
      - uses: actions/upload-artifact@v5.0.0
        with:
          name: discord-readonly-bot-sbom
          path: |
            dist/*.cdx.json
            dist/*.cdx.json.sha256
          if-no-files-found: error
      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_ARGS=(
            --repo "${GITHUB_REPOSITORY}"
            --title "${GITHUB_REF_NAME}"
            --notes-file "docs/releases/${GITHUB_REF_NAME}.md"
            --verify-tag
          )
          if [[ "${VERSION}" == *-* ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          gh release create "${GITHUB_REF_NAME}" \
            "${RELEASE_ARGS[@]}" \
            "dist/discord-readonly-bot-v${VERSION}.tar.gz" \
            "dist/discord-readonly-bot-v${VERSION}.tar.gz.sha256" \
            "dist/dune-awakening-selfhost-discordbot.cdx.json" \
            "dist/dune-awakening-selfhost-discordbot.cdx.json.sha256"
