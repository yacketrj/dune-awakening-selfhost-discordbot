name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate

  semgrep-sast:
    name: semgrep-sast
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - run: python -m pip install semgrep==1.167.0
      - name: Run Semgrep
        run: >
          semgrep scan
          --config p/default
          --config p/secrets
          --error
          --severity ERROR
          --severity WARNING
          --exclude node_modules
          --exclude .git
          --exclude package-lock.json
          .

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  trivy-filesystem:
    name: trivy-filesystem
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          hide-progress: true
          skip-dirs: node_modules,.git

  trivy-image:
    name: trivy-image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Build runtime image
        run: docker build -t dune-awakening-selfhost-discordbot:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: dune-awakening-selfhost-discordbot:${{ github.sha }}
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          hide-progress: true
